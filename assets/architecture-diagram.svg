<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 680" width="620" height="680" style="background:#0d0d0d">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- OmniLog UI box (top centre) -->
  <rect x="200" y="20" width="220" height="72" rx="8" fill="#1e2a3a" stroke="#3b5a8a" stroke-width="1.5"/>
  <text x="310" y="44" text-anchor="middle" fill="#8ab4e8" font-family="monospace" font-size="13" font-weight="bold">OmniLog UI</text>
  <text x="310" y="62" text-anchor="middle" fill="#7a9ec4" font-family="monospace" font-size="11">(React/Vite)</text>
  <text x="310" y="80" text-anchor="middle" fill="#5c84b0" font-family="monospace" font-size="10">http://localhost:5173</text>

  <!-- Arrow: OmniLog UI → OmniLog API -->
  <line x1="310" y1="92" x2="310" y2="148" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="322" y="126" fill="#888" font-family="monospace" font-size="10">/omnilog-api proxy</text>

  <!-- OmniLog API box -->
  <rect x="180" y="152" width="260" height="72" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="310" y="176" text-anchor="middle" fill="#7ec87e" font-family="monospace" font-size="13" font-weight="bold">OmniLog API</text>
  <text x="310" y="194" text-anchor="middle" fill="#68a868" font-family="monospace" font-size="11">(Flask 5002)</text>
  <text x="310" y="212" text-anchor="middle" fill="#4e8a4e" font-family="monospace" font-size="10">Claude claude-opus-4-7</text>

  <!-- Arrow: OmniLog API → Graylog (left) -->
  <line x1="260" y1="224" x2="220" y2="306" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: OmniLog API → ML Service (right) -->
  <line x1="380" y1="224" x2="490" y2="306" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Log Generator box (far left) -->
  <rect x="20" y="300" width="148" height="88" rx="8" fill="#2a2000" stroke="#6e5200" stroke-width="1.5"/>
  <text x="94" y="326" text-anchor="middle" fill="#c8a030" font-family="monospace" font-size="12" font-weight="bold">Log Generator</text>
  <text x="94" y="344" text-anchor="middle" fill="#a88820" font-family="monospace" font-size="10">(Python / GELF</text>
  <text x="94" y="360" text-anchor="middle" fill="#a88820" font-family="monospace" font-size="10">TCP → :12201)</text>
  <text x="94" y="378" text-anchor="middle" fill="#7a6010" font-family="monospace" font-size="9"> </text>

  <!-- Arrow: Log Generator → Graylog -->
  <line x1="168" y1="344" x2="196" y2="344" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Graylog box (centre) -->
  <rect x="198" y="300" width="220" height="88" rx="8" fill="#2a1800" stroke="#7a4800" stroke-width="1.5"/>
  <text x="308" y="324" text-anchor="middle" fill="#d4883a" font-family="monospace" font-size="13" font-weight="bold">Graylog 6.1</text>
  <text x="308" y="342" text-anchor="middle" fill="#b87030" font-family="monospace" font-size="10">:9000 (HTTP)</text>
  <text x="308" y="358" text-anchor="middle" fill="#b87030" font-family="monospace" font-size="10">:12201 (GELF TCP)</text>
  <text x="308" y="374" text-anchor="middle" fill="#b87030" font-family="monospace" font-size="10">:1514 (Syslog)</text>

  <!-- ML Service box (right) -->
  <rect x="440" y="300" width="160" height="88" rx="8" fill="#2a0a10" stroke="#7a2030" stroke-width="1.5"/>
  <text x="520" y="332" text-anchor="middle" fill="#d46878" font-family="monospace" font-size="12" font-weight="bold">ML Service (5001)</text>
  <text x="520" y="352" text-anchor="middle" fill="#b84858" font-family="monospace" font-size="10">Severity + ZeroDay</text>
  <text x="520" y="370" text-anchor="middle" fill="#7a2830" font-family="monospace" font-size="9"> </text>

  <!-- Dashed arrow: Graylog ↔ ML Service -->
  <line x1="418" y1="344" x2="442" y2="344" stroke="#666" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <line x1="442" y1="356" x2="418" y2="356" stroke="#666" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>

  <!-- Arrow: Graylog → OpenSearch -->
  <line x1="308" y1="388" x2="308" y2="456" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="428" fill="#888" font-family="monospace" font-size="10">OpenSearch protocol</text>

  <!-- OpenSearch box -->
  <rect x="140" y="460" width="200" height="70" rx="8" fill="#220a2a" stroke="#5a1a7a" stroke-width="1.5"/>
  <text x="240" y="488" text-anchor="middle" fill="#b078d0" font-family="monospace" font-size="12" font-weight="bold">OpenSearch 2.15</text>
  <text x="240" y="508" text-anchor="middle" fill="#9058b0" font-family="monospace" font-size="10">(log storage)</text>

  <!-- MongoDB box -->
  <rect x="380" y="460" width="180" height="70" rx="8" fill="#220a2a" stroke="#5a1a7a" stroke-width="1.5"/>
  <text x="470" y="488" text-anchor="middle" fill="#b078d0" font-family="monospace" font-size="12" font-weight="bold">MongoDB 7</text>
  <text x="470" y="508" text-anchor="middle" fill="#9058b0" font-family="monospace" font-size="10">(Graylog config)</text>

  <!-- Dashed arrow: Graylog → MongoDB -->
  <path d="M 418 358 Q 520 420 470 460" stroke="#666" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>

  <!-- Dashed arrow: Graylog → OpenSearch (side) -->
  <path d="M 198 358 Q 140 420 200 460" stroke="#666" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-dashed)"/>
</svg>
